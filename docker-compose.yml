version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: smartleads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartleads-network

  # Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartleads-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_me}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - smartleads-network

  # Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smartleads-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server
    networks:
      - smartleads-network

volumes:
  mongodb_data:

networks:
  smartleads-network:
    driver: bridge
